<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capas de Hoje — Jornais e Revistas | PDFreeto</title>
<meta name="description" content="Veja as capas dos jornais e revistas portugueses de hoje. Atualizado diariamente.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#111;--border:#2a2a2a;--accent:#e8ff3c;--text:#f0ede6;--muted:#666;--mono:"DM Mono",monospace;--sans:"DM Sans",sans-serif;--display:"Bebas Neue",sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(232,255,60,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,60,.03) 1px,transparent 1px);background-size:60px 60px}

  /* HEADER */
  header{position:relative;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:16px}
  .logo{font-family:var(--display);font-size:2rem;letter-spacing:.08em;color:var(--text);text-decoration:none;flex-shrink:0}
  .logo span{color:var(--accent)}
  .nav-dropdown{position:relative;flex-shrink:0}
  .nav-toggle{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text);background:none;border:1px solid var(--border);padding:7px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
  .nav-toggle:hover,.nav-toggle.open{border-color:var(--accent);color:var(--accent)}
  .nav-toggle .arr{font-size:.6rem;transition:transform .2s}
  .nav-toggle.open .arr{transform:rotate(180deg)}
  .nav-menu{display:none;position:absolute;top:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);min-width:220px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.6)}
  .nav-menu.open{display:block}
  .nav-menu a{display:block;padding:10px 16px;font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);transition:all .15s}
  .nav-menu a:last-child{border-bottom:none}
  .nav-menu a:hover,.nav-menu a.active{color:var(--accent);padding-left:22px}
  .blog-btn{font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text);background:none;border:1px solid var(--border);padding:7px 14px;text-decoration:none;transition:all .2s;white-space:nowrap}
  .blog-btn:hover{border-color:var(--accent);color:var(--accent)}
  .lang-sw{display:flex;align-items:center;gap:4px}
  .lb{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;padding:5px 9px;background:none;border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:all .2s}
  .lb.active{color:var(--accent);border-color:var(--accent)}

  /* HERO */
  .hero{position:relative;z-index:10;padding:48px 40px 28px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap}
  .eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";display:inline-block;width:24px;height:2px;background:var(--accent)}
  .hero h1{font-family:var(--display);font-size:clamp(3rem,8vw,7rem);line-height:.92;letter-spacing:.02em}
  .hero h1 span{color:var(--accent)}
  .hero-right{text-align:right}
  .today-date{font-family:var(--display);font-size:1.4rem;letter-spacing:.06em;color:var(--muted)}
  .update-info{font-family:var(--mono);font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
  .refresh-btn{margin-top:10px;font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* FILTER */
  .filter-bar{position:relative;z-index:10;padding:0 40px;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .ftab{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:13px 18px;cursor:pointer;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;flex-shrink:0}
  .ftab:hover{color:var(--text)}
  .ftab.active{color:var(--accent);border-bottom-color:var(--accent)}

  /* STATES */
  .state{position:relative;z-index:10;text-align:center;padding:80px 40px;display:none}
  .state.visible{display:block}
  .dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.2s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
  .state p{font-family:var(--mono);font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .state.err p{color:#ff5533}

  /* CONTENT */
  .content{position:relative;z-index:10;padding:0 40px 80px}
  .section{margin-top:36px;display:none}
  .section.show{display:block}
  .sec-title{font-family:var(--display);font-size:1.6rem;letter-spacing:.06em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px}
  .sec-count{font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:.1em}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  @media(min-width:800px){.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}}

  /* CARD */
  .card{cursor:pointer;display:block;transition:transform .18s}
  .card:hover{transform:translateY(-4px)}
  .card-img-wrap{position:relative;background:var(--surface);border:1px solid var(--border);overflow:hidden;aspect-ratio:3/4}
  .card img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .35s}
  .card img.ready{opacity:1}
  .card-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;text-align:center}
  .card-ph span{font-family:var(--mono);font-size:.6rem;color:var(--muted);letter-spacing:.06em;line-height:1.5}
  .card-shine{position:absolute;inset:0;background:rgba(232,255,60,.07);opacity:0;transition:opacity .18s}
  .card:hover .card-shine{opacity:1}
  .card-today{position:absolute;top:7px;left:7px;font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;color:#0a0a0a;background:var(--accent);padding:2px 6px;font-weight:600}
  .card-name{margin-top:7px;font-family:var(--mono);font-size:.62rem;letter-spacing:.07em;color:var(--muted);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .18s}
  .card:hover .card-name{color:var(--text)}

  /* LIGHTBOX */
  .lb-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:20px}
  .lb-overlay.open{opacity:1;pointer-events:all}
  .lb-box{position:relative;max-width:min(480px,90vw);max-height:90vh;display:flex;flex-direction:column;align-items:center;gap:16px}
  .lb-img{max-width:100%;max-height:80vh;object-fit:contain;border:1px solid var(--border);box-shadow:0 24px 80px rgba(0,0,0,.8)}
  .lb-name{font-family:var(--display);font-size:1.4rem;letter-spacing:.08em;color:var(--text)}
  .lb-date{font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:.12em}
  .lb-close{position:fixed;top:20px;right:24px;font-family:var(--mono);font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);padding:7px 14px;cursor:pointer;transition:all .2s}
  .lb-close:hover{border-color:var(--accent);color:var(--accent)}
  .lb-nav{display:flex;gap:12px;margin-top:4px}
  .lb-nav button{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 18px;background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
  .lb-nav button:hover{border-color:var(--accent);color:var(--accent)}

  footer{position:relative;z-index:10;text-align:center;padding:24px;border-top:1px solid var(--border)}
  .fl{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .fl a{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text);text-decoration:none}
  .fl a:hover{color:var(--accent)}
  .fs{color:var(--border)}
  .fn{font-family:var(--mono);font-size:.62rem;color:var(--muted)}
  @media(max-width:600px){header{padding:12px 16px}.logo{font-size:1.5rem}.hero{padding:32px 20px 20px}.filter-bar{padding:0 12px}.content{padding:0 16px 60px}.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">PDF<span>reeto</span></a>
  <div class="nav-dropdown">
    <button class="nav-toggle" id="nav-toggle">All <span class="arr">&#9662;</span></button>
    <div class="nav-menu" id="nav-menu">
      <a href="/">JPG &#8596; PDF</a>
      <a href="/pdf-to-word.html">Word to PDF</a>
      <a href="/compress-pdf.html">Compress PDF</a>
      <a href="/pdf-ai.html">PDF AI</a>
      <a href="/social-media.html">Social Media</a>
      <a href="/seo.html">SEO</a>
      <a href="/voice.html">Voice</a>
      <a href="/capas.html" class="active">Capas &#9733;</a>
    </div>
  </div>
  <a href="/blog/" class="blog-btn">Blog</a>
  <div class="lang-sw"><a href="/capas.html" class="lb active">PT</a></div>
</header>

<div class="hero">
  <div>
    <div class="eyebrow">Capas do Dia &middot; Portugal</div>
    <h1>Jornais &<br><span>Revistas</span></h1>
  </div>
  <div class="hero-right">
    <div class="today-date" id="hero-date"></div>
    <div class="update-info" id="update-info">A carregar...</div>
    <button class="refresh-btn" onclick="load(true)">&#8635; Atualizar</button>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="ftab active" data-sec="all">Todas</button>
</div>

<div class="state visible" id="st-loading">
  <div class="dots"><span></span><span></span><span></span></div>
  <p>A carregar as capas de hoje...</p>
</div>
<div class="state err" id="st-error">
  <p id="err-msg">Erro ao carregar</p>
  <button class="refresh-btn" onclick="load(true)" style="margin:16px auto 0;display:inline-block">Tentar novamente</button>
</div>

<div class="content" id="content"></div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lb" onclick="closeLB(event)">
  <button class="lb-close" onclick="closeLB()">&#10005; Fechar</button>
  <div class="lb-box">
    <img class="lb-img" id="lb-img" src="" alt="">
    <div class="lb-name" id="lb-name"></div>
    <div class="lb-date" id="lb-date"></div>
    <div class="lb-nav">
      <button onclick="lbNav(-1)">&#9664; Anterior</button>
      <button onclick="lbNav(1)">Seguinte &#9654;</button>
    </div>
  </div>
</div>

<footer>
  <div class="fl">
    <a href="/">JPG &#8596; PDF</a><span class="fs">&#183;</span>
    <a href="/pdf-ai.html">PDF AI</a><span class="fs">&#183;</span>
    <a href="/voice.html">Voice</a><span class="fs">&#183;</span>
    <a href="/capas.html">Capas</a><span class="fs">&#183;</span>
    <a href="/blog/">Blog</a>
  </div>
  <div class="fn">PDFreeto &middot; Capas atualizadas diariamente</div>
</footer>

<script>
// ── NAV ──
document.getElementById('nav-toggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('nav-menu').classList.toggle('open');
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-dropdown')) {
    document.getElementById('nav-toggle').classList.remove('open');
    document.getElementById('nav-menu').classList.remove('open');
  }
});

// ── DATE ──
var today = new Date();
var todayISO = today.toISOString().split('T')[0];
document.getElementById('hero-date').textContent = today.toLocaleDateString('pt-PT', {weekday:'long',day:'numeric',month:'long'});

// ── ALL PUBS (flat list for lightbox navigation) ──
var allPubs = [];
var lbIdx = 0;

// ── PROXY URL ──
function proxyUrl(imgUrl) {
  if (!imgUrl) return '';
  return '/.netlify/functions/cover?url=' + encodeURIComponent(imgUrl);
}

function fullUrl(thumbUrl) {
  // Convert thumbnail URL (/th/) to full-size
  return thumbUrl.replace('/th/', '/');
}

// ── LOAD ──
async function load(force) {
  setState('loading');
  var cacheKey = 'capas2-' + todayISO;
  var data = null;
  if (!force) {
    try { data = JSON.parse(sessionStorage.getItem(cacheKey)); } catch(e) {}
  }
  if (!data) {
    try {
      var res = await fetch('/.netlify/functions/fetch-capas');
      data = await res.json();
      if (data.sections && data.sections.length > 0) {
        try { sessionStorage.setItem(cacheKey, JSON.stringify(data)); } catch(e) {}
      }
    } catch(e) {
      showError('Sem ligação. Tenta novamente.');
      return;
    }
  }
  if (data.error) { showError('Erro: ' + data.error); return; }
  if (!data.sections || data.sections.length === 0) {
    showError('Sem capas encontradas. O site de origem pode estar temporariamente indisponível.');
    return;
  }
  render(data);
}

function setState(s) {
  document.getElementById('st-loading').classList.toggle('visible', s === 'loading');
  document.getElementById('st-error').classList.toggle('visible', s === 'error');
  document.getElementById('content').style.display = s === 'ready' ? 'block' : 'none';
}
function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  setState('error');
}

// ── RENDER ──
function render(data) {
  var fetched = new Date(data.fetched);
  document.getElementById('update-info').textContent =
    'Atualizado às ' + fetched.toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'}) +
    ' · ' + (data.count || 0) + ' capas';

  // Build flat list for lightbox
  allPubs = [];
  data.sections.forEach(function(sec) { sec.pubs.forEach(function(p) { allPubs.push(p); }); });

  // Filter tabs
  var bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="ftab active" data-sec="all">Todas (' + allPubs.length + ')</button>';
  data.sections.forEach(function(sec) {
    var btn = document.createElement('button');
    btn.className = 'ftab';
    btn.dataset.sec = sec.title;
    btn.textContent = sec.title + ' (' + sec.pubs.length + ')';
    bar.appendChild(btn);
  });
  bar.querySelectorAll('.ftab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      bar.querySelectorAll('.ftab').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.section').forEach(function(s) {
        s.classList.toggle('show', btn.dataset.sec === 'all' || s.dataset.sec === btn.dataset.sec);
      });
    });
  });

  // Sections
  var content = document.getElementById('content');
  content.innerHTML = '';
  data.sections.forEach(function(sec) {
    var div = document.createElement('div');
    div.className = 'section show';
    div.dataset.sec = sec.title;
    div.innerHTML = '<div class="sec-title">' + sec.title + ' <span class="sec-count">' + sec.pubs.length + '</span></div>';
    var grid = document.createElement('div');
    grid.className = 'grid';

    sec.pubs.forEach(function(pub) {
      var idx = allPubs.indexOf(pub);
      var isToday = pub.date === todayISO;
      var card = document.createElement('div');
      card.className = 'card';
      card.title = pub.title + (pub.date ? ' · ' + pub.date : '');
      card.addEventListener('click', function() { openLB(idx); });

      var wrap = document.createElement('div');
      wrap.className = 'card-img-wrap';

      // Placeholder
      var ph = document.createElement('div');
      ph.className = 'card-ph';
      ph.innerHTML = '<span>' + pub.title + '</span>';
      wrap.appendChild(ph);

      // Today badge
      if (isToday) {
        var badge = document.createElement('div');
        badge.className = 'card-today';
        badge.textContent = 'Hoje';
        wrap.appendChild(badge);
      }

      // Shine overlay
      var shine = document.createElement('div');
      shine.className = 'card-shine';
      wrap.appendChild(shine);

      // Image (lazy via IntersectionObserver)
      if (pub.thumb) {
        var img = document.createElement('img');
        img.alt = pub.title;
        var observer = new IntersectionObserver(function(entries, obs) {
          if (!entries[0].isIntersecting) return;
          img.src = proxyUrl(pub.thumb);
          img.onload = function() { img.classList.add('ready'); };
          img.onerror = function() { img.style.display = 'none'; };
          obs.disconnect();
        }, { rootMargin: '300px' });
        observer.observe(card);
        wrap.appendChild(img);
      }

      card.appendChild(wrap);
      var name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = pub.title;
      card.appendChild(name);
      grid.appendChild(card);
    });

    div.appendChild(grid);
    content.appendChild(div);
  });

  setState('ready');
}

// ── LIGHTBOX ──
function openLB(idx) {
  lbIdx = idx;
  showLB();
  document.getElementById('lb').classList.add('open');
  document.addEventListener('keydown', lbKey);
}

function showLB() {
  var pub = allPubs[lbIdx];
  if (!pub) return;
  var lb = document.getElementById('lb-img');
  lb.style.opacity = '0';
  lb.style.transition = '';
  var full = fullUrl(pub.thumb);
  lb.src = proxyUrl(full);
  lb.onload = function() { lb.style.opacity = '1'; lb.style.transition = 'opacity .3s'; };
  lb.onerror = function() {
    // Full-size failed — fall back to thumbnail
    if (lb.src !== proxyUrl(pub.thumb)) {
      lb.src = proxyUrl(pub.thumb);
    }
  };
  lb.alt = pub.title;
  document.getElementById('lb-name').textContent = pub.title;
  document.getElementById('lb-date').textContent = pub.date
    ? pub.date.split('-').reverse().join('/') : '';
}

function closeLB(e) {
  if (e && e.target !== document.getElementById('lb') && !e.target.classList.contains('lb-close')) return;
  document.getElementById('lb').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}

function lbNav(dir) {
  lbIdx = (lbIdx + dir + allPubs.length) % allPubs.length;
  showLB();
}

function lbKey(e) {
  if (e.key === 'ArrowRight') lbNav(1);
  else if (e.key === 'ArrowLeft') lbNav(-1);
  else if (e.key === 'Escape') closeLB();
}

// ── START ──
setState('loading');
document.getElementById('content').style.display = 'none';
load(false);
</script>
</body>
</html>
